# Single source of truth for the app's display name. Drives the in-app name (app_name
# resource, generated in build.gradle.kts) AND the output APK filename (build.sh).
appName=Timbra

org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8
org.gradle.caching=true
android.useAndroidX=true
android.nonTransitiveRClass=true
kotlin.code.style=official
